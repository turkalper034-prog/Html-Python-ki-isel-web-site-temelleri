<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formlar</title>
</head>
<body>

    <form>
        <p>

            Ad : <input type="text">
        </p>
        <p>
            Soyad : <input type="text">


        </p>
        <p>
            Eposta : <input type="email">


        </p>
        <p>
            Parola : <input type="password">


        </p>
        <p>
            Parola Hatırla : <input type="checkbox">


        </p>
        <p>
            Cinsiyetiniz : 
            Erkek <input type="radio" name="cinsiyet">
            Kadın <input type="radio" name="cinsiyet">


        </p>
        <p>
            Doğum Yeri : <br>
            <select name="dogumyeri">
                <option>Eskişehir</option>
                <option>İstanbul</option>
                <option>Ardahan</option>


            </select>


        </p>

    </form>
    
</body>
</html>
