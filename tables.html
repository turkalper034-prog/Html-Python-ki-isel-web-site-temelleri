<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Araç Liste Fiyatları</title>
</head>

<body>
    <table border="2"> 
    <thead>
        <tr>
        <th>Araç Adı</th>
        <th>Fiyatı</th>
        <th>Açıklama</th>
        </tr>
    </thead>

    <tbody>

        <tr>
            <td>X</td>
            <td>100.000 </td>
            <td>Sadece Ön Kapı Boyalı</td>
        </tr>
        <tr>
            <td>Y</td>
            <td>200.000</td>
            <td>Sadece Ön Çamurluk Değişmiş</td>
        </tr>
        <tr>
            <td>Z</td>
            <td>300.000</td>
            <td>Arka kapı ve Ön Çamurluk Hasarlı</td>
        </tr>


    </tbody>
    </table>
    
</body>
</html>
